services:
  backend:
    build: .
    container_name: siri-admin-backend
    ports:
      - "7156:7156"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      # Match the business timezone — the backend stamps and filters dates
      # with local time (datetime.now()), same as the desktop sidecar.
      - TZ=Asia/Kolkata
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7156/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backend-data:
